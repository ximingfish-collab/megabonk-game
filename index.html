<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>MegaBonk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      position: fixed;
      inset: 0;
      touch-action: none;
      background: #87ceeb;
      font-family: 'Press Start 2P', monospace;
      color: #fff;
    }
    #game-container {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      touch-action: none;
    }
    #game-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    /* Damage numbers */
    .damage-number {
      position: fixed;
      pointer-events: none;
      font-family: 'Press Start 2P', monospace;
      font-size: 12px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
      z-index: 1000;
      animation: floatUp 0.8s ease-out forwards;
      white-space: nowrap;
    }
    .damage-number.crit {
      font-size: 18px;
      color: #ffd700;
    }
    .damage-number.player-hit {
      color: #ff4444;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-40px) scale(0.7); opacity: 0; }
    }
    /* Screen flash */
    .screen-flash {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 900;
      opacity: 0;
      transition: opacity 0.1s;
    }
    .screen-flash.hit {
      border: 4px solid rgba(255, 0, 0, 0.6);
      opacity: 1;
    }
    .screen-flash.levelup {
      background: rgba(255, 215, 0, 0.3);
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="screen-flash" class="screen-flash"></div>
  <script>
    document.documentElement.lang = (navigator.language || '').startsWith('zh') ? 'zh-CN' : 'en';
  </script>
  <script type="module" src="/game/client/main.ts"></script>
</body>
</html>
