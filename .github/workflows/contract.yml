name: Framework Contract

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Static contract check
        run: bash scripts/harness/check-contract.sh

      - name: Runtime contract tests
        run: pnpm --filter @minigame/core exec vitest run contract.test.ts

      - name: Type check
        run: npx tsc --noEmit
